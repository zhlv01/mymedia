{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0">确认删除</h4>
            </div>
            <div class="card-body text-center py-5">
                <i class="bi bi-exclamation-triangle display-1 text-danger mb-4"></i>
                <h5 class="mb-4">确定要删除音乐 "{{ music.media_item.title }}" 吗？</h5>
                <p class="text-muted mb-4">此操作不可撤销，相关的文件和分享链接也将失效。</p>
                <div class="d-flex justify-content-center gap-3">
                    <a href="{% url 'music:list' %}" class="btn btn-outline-secondary">取消</a>
                    <form method="POST">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger">确认删除</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
