{% extends 'base.html' %}

{% block content %}
<div class="row">
    <div class="col-lg-3">
        <div class="sidebar">
            <h5 class="mb-3">导航</h5>
            <a href="{% url 'core:dashboard' %}" class="sidebar-link">
                <i class="bi bi-speedometer2"></i> 仪表盘
            </a>
            <a href="{% url 'core:category_list' %}" class="sidebar-link active">
                <i class="bi bi-folder"></i> 分类管理
            </a>
        </div>
    </div>
    
    <div class="col-lg-9">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-folder text-primary"></i> 分类管理</h2>
            <a href="{% url 'core:category_add' %}" class="btn btn-primary">
                <i class="bi bi-plus-circle"></i> 添加分类
            </a>
        </div>
        
        {% if categories %}
        <div class="row">
            {% for category in categories %}
            <div class="col-md-4">
                <div class="card media-card">
                    <div class="card-body">
                        <div class="d-flex align-items-center mb-3">
                            <div class="rounded-circle me-3" style="width: 40px; height: 40px; background-color: {{ category.color }};"></div>
                            <h5 class="mb-0">{{ category.name }}</h5>
                        </div>
                        <div class="d-flex justify-content-end">
                            <a href="{% url 'core:category_edit' category.pk %}" class="btn btn-sm btn-outline-secondary me-2">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <button type="button" class="btn btn-sm btn-outline-danger" data-bs-toggle="modal" data-bs-target="#deleteModal{{ category.pk }}">
                                <i class="bi bi-trash"></i>
                            </button>
                        </div>
                    </div>
                </div>
                
                <div class="modal fade" id="deleteModal{{ category.pk }}" tabindex="-1">
                    <div class="modal-dialog">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h5 class="modal-title">确认删除</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                            </div>
                            <div class="modal-body">
                                确定要删除分类 "{{ category.name }}" 吗？
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                                <form method="POST" action="{% url 'core:category_delete' category.pk %}" class="d-inline">
                                    {% csrf_token %}
                                    <button type="submit" class="btn btn-danger">删除</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
        {% else %}
        <div class="card">
            <div class="card-body text-center py-5">
                <i class="bi bi-folder display-1 text-muted mb-3"></i>
                <h4 class="text-muted">还没有创建分类</h4>
                <p class="text-muted">创建分类来更好地管理你的媒体收藏！</p>
                <a href="{% url 'core:category_add' %}" class="btn btn-primary mt-3">
                    <i class="bi bi-plus-circle"></i> 添加分类
                </a>
            </div>
        </div>
        {% endif %}
    </div>
</div>
{% endblock %}
