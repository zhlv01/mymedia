{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card">
            <div class="card-body text-center p-5">
                <i class="bi bi-lock display-1 text-primary mb-4"></i>
                <h3 class="mb-4">此内容已加密</h3>
                <p class="text-muted mb-4">请输入访问密码查看内容</p>
                
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <input type="password" name="password" class="form-control form-control-lg text-center" placeholder="输入密码" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">提交</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
